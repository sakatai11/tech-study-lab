<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevPath — Dev-Native Neo Flat Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ==========================================================
     Design tokens — Playful Dev-Native Neo Flat
     Duolingo のループと形（チャンキーなボタン・ベタ塗り・バウンス）
     × GitHub の計器盤（草・ストリーク・数値）
     × エディタの色彩（シンタックスハイライトパレット）
     ダークファースト。
     ========================================================== */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  :root, :root[data-theme="dark"]{
    --bg:#0d1117; --surface:#161b22; --well:#1c2330; --border:#30363d; --border-hi:#454d57;
    --ink:#e6edf3; --ink-2:#c9d1d9; --mute:#9198a1; --faint:#6e7681;
    /* syntax palette (VS Code / GitHub dark) */
    --green:#3fb950; --green-shade:#26903b; --green-bg:rgba(63,185,80,.14);
    --red:#f85149; --red-shade:#c93c36; --red-bg:rgba(248,81,73,.13);
    --blue:#58a6ff; --blue-shade:#3d7dd6; --blue-bg:rgba(88,166,255,.13);
    --yellow:#e3b341; --purple:#bc8cff; --purple-bg:rgba(188,140,255,.13);
    --orange:#f0883e; --cyan:#39c5cf;
    --heat0:#1c2330; --heat1:#0e4429; --heat2:#006d32; --heat3:#26a641; --heat4:#39d353;
    --key-bg:#21262d;
    --ease-out:cubic-bezier(.22,1,.36,1);
    --ease-spring:cubic-bezier(.34,1.56,.64,1);
  }
  :root[data-theme="light"]{
    --bg:#f6f8fa; --surface:#ffffff; --well:#eef1f4; --border:#d0d7de; --border-hi:#b4bcc4;
    --ink:#1f2328; --ink-2:#3d444d; --mute:#59636e; --faint:#818b98;
    --green:#2da44e; --green-shade:#1f7a38; --green-bg:rgba(45,164,78,.12);
    --red:#cf222e; --red-shade:#a40e26; --red-bg:rgba(207,34,46,.10);
    --blue:#0969da; --blue-shade:#0550ae; --blue-bg:rgba(9,105,218,.10);
    --yellow:#9a6700; --purple:#8250df; --purple-bg:rgba(130,80,223,.10);
    --orange:#bc4c00; --cyan:#1b7c83;
    --heat0:#ebedf0; --heat1:#9be9a8; --heat2:#40c463; --heat3:#30a14e; --heat4:#216e39;
    --key-bg:#f0f2f5;
  }
  body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--ink-2);transition:background .3s,color .3s}
  button{font-family:inherit}
  .mono{font-family:'JetBrains Mono',monospace}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}

  /* ============ surfaces ============ */
  .card{background:var(--surface);border:2px solid var(--border);border-radius:16px;transition:background .3s,border-color .3s}
  .well{background:var(--well);border-radius:12px}
  .chip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);border-radius:9999px;background:var(--well);font-family:'JetBrains Mono',monospace}

  /* ============ chunky buttons (Duolingo 文法) ============ */
  .btn{position:relative;overflow:hidden;border:0;border-radius:14px;font-weight:800;letter-spacing:.03em;cursor:pointer;transition:filter .15s,transform .08s,box-shadow .08s,opacity .3s}
  .btn:active{transform:translateY(4px);box-shadow:0 0 0 transparent !important}
  .btn-green{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-shade)}
  .btn-green:hover{filter:brightness(1.1)}
  .btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 0 var(--blue-shade)}
  .btn-blue:hover{filter:brightness(1.1)}
  .btn-ghost{background:var(--surface);color:var(--ink-2);border:2px solid var(--border);box-shadow:0 4px 0 var(--border)}
  .btn-ghost:hover{border-color:var(--border-hi);color:var(--ink)}
  .btn[disabled]{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none !important}

  /* ============ layout ============ */
  .app{display:flex;gap:20px;max-width:1240px;margin:0 auto;padding:20px;min-height:100vh}
  .sidebar{width:236px;flex:none;display:flex;flex-direction:column;padding:18px 14px;align-self:flex-start;position:sticky;top:20px;max-height:calc(100vh - 40px)}
  .main{flex:1;display:flex;flex-direction:column;gap:20px;min-width:0;padding-bottom:24px}

  .navitem{position:relative;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:2px solid transparent;background:transparent;cursor:pointer;font-size:14px;font-weight:600;color:var(--mute);width:100%;text-align:left;transition:background .2s,color .2s,border-color .2s}
  .navitem:hover{background:var(--well);color:var(--ink-2)}
  .navitem.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
  .nav-badge{margin-left:auto;font-size:11px;font-weight:700;color:#fff;background:var(--red);padding:2px 9px;border-radius:9999px;animation:badge-pulse 2.4s ease-in-out infinite}
  @keyframes badge-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}

  .theme-toggle{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--mute);cursor:pointer;transition:color .2s,border-color .2s,transform .3s var(--ease-spring)}
  .theme-toggle:hover{color:var(--yellow);border-color:var(--border-hi);transform:rotate(15deg)}

  .appbar{display:none}
  .tabbar{display:none}

  /* ============ terminal decorations ============ */
  .term-crumb{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--faint);display:flex;align-items:center;gap:2px;flex-wrap:wrap}
  .term-crumb .p{color:var(--green);margin-right:6px}
  .cursor{display:inline-block;width:7px;height:14px;background:var(--green);margin-left:6px;animation:blink 1.1s steps(1) infinite;vertical-align:-2px}
  @keyframes blink{50%{opacity:0}}
  .term-win{border:2px solid var(--border);border-radius:12px;overflow:hidden;background:#0d1117}
  :root[data-theme="light"] .term-win{background:#0d1117}
  .term-head{display:flex;align-items:center;gap:6px;padding:10px 14px;background:#161b22;border-bottom:1px solid #30363d}
  .term-dot{width:11px;height:11px;border-radius:9999px}
  .term-title{margin-left:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#6e7681}
  .term-body{padding:16px 18px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.8;color:#c9d1d9;overflow-x:auto;white-space:pre}

  /* ============ stagger / motion ============ */
  .reveal{opacity:0;animation:rise .5s var(--ease-out) forwards;animation-delay:calc(var(--i,0)*70ms)}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .view-exit{animation:sink .16s ease-in forwards}
  @keyframes sink{to{opacity:0;transform:translateY(-10px)}}
  .pop-in{animation:pop .45s var(--ease-spring)}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
  .bounce{animation:bounce .5s var(--ease-spring)}
  @keyframes bounce{0%{transform:translateY(0)}35%{transform:translateY(-7px)}70%{transform:translateY(2px)}100%{transform:translateY(0)}}
  .wiggle{animation:wiggle 2.6s ease-in-out infinite}
  @keyframes wiggle{0%,100%{transform:rotate(0)}8%{transform:rotate(-8deg)}16%{transform:rotate(8deg)}24%{transform:rotate(0)}}

  /* ============ components ============ */
  .page-head h1{margin:0;font-size:25px;font-weight:900;letter-spacing:-.02em;color:var(--ink)}
  .page-head p{margin:6px 0 0;font-size:14px;color:var(--mute)}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .stat-card{padding:18px}
  .stat-icon{display:grid;place-items:center;width:40px;height:40px;border-radius:12px}
  .stat-value{margin-top:12px;font-size:26px;font-weight:800;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-.03em}
  .stat-unit{font-size:13px;font-weight:600;color:var(--mute)}
  .stat-label{margin-top:2px;font-size:12.5px;color:var(--mute)}

  /* heatmap（草） */
  .heat-grid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px}
  .heat-cell{width:100%;aspect-ratio:1;border-radius:2.5px;background:var(--heat0);opacity:0;animation:heat-in .3s forwards;animation-delay:calc(var(--i)*4ms)}
  @keyframes heat-in{to{opacity:1}}

  /* progress（セグメント） */
  .seg-track{display:flex;gap:6px}
  .seg{flex:1;height:14px;border-radius:9999px;background:var(--well);border:1.5px solid var(--border);overflow:hidden;position:relative}
  .seg .seg-fill{position:absolute;inset:0;background:var(--green);border-radius:9999px;transform:scaleX(0);transform-origin:left;transition:transform .5s var(--ease-out)}
  .seg.done .seg-fill{transform:scaleX(1)}

  .bar-track{height:12px;border-radius:9999px;background:var(--well);border:1.5px solid var(--border);overflow:hidden}
  .bar-fill{height:100%;border-radius:9999px;width:0;animation:fillw 1s var(--ease-out) forwards;animation-delay:calc(.2s + var(--i,0)*90ms)}
  @keyframes fillw{to{width:var(--w)}}

  .row-press{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:12px;border:2px solid transparent;cursor:pointer;transition:background .2s,border-color .2s,transform .15s}
  .row-press:hover{background:var(--well);border-color:var(--border);transform:translateX(3px)}

  /* keycap */
  .key{display:grid;place-items:center;min-width:26px;height:26px;padding:0 6px;border-radius:7px;background:var(--key-bg);border:1.5px solid var(--border);border-bottom-width:3px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--mute);transition:all .2s}

  /* quiz options */
  .optbtn{display:flex;width:100%;align-items:center;gap:14px;border:2px solid var(--border);border-radius:14px;background:var(--surface);padding:15px 18px;text-align:left;cursor:pointer;color:var(--ink);font-size:14.5px;font-weight:600;box-shadow:0 3px 0 var(--border);transition:border-color .15s,background .15s,transform .08s,box-shadow .08s,opacity .3s}
  .optbtn:not(.locked):hover{border-color:var(--blue);background:var(--blue-bg)}
  .optbtn:not(.locked):active{transform:translateY(3px);box-shadow:0 0 0 transparent}
  .optbtn.locked{opacity:1;cursor:default;transform:none}
  .optbtn.locked:not(.opt-correct):not(.opt-wrong){opacity:.42}
  .optbtn.opt-correct{border-color:var(--green);background:var(--green-bg);color:var(--green);box-shadow:0 3px 0 var(--green-shade);animation:opt-bounce .5s var(--ease-spring)}
  .optbtn.opt-correct .key{background:var(--green);border-color:var(--green-shade);color:#fff;animation:pop .45s var(--ease-spring)}
  .optbtn.opt-wrong{border-color:var(--red);background:var(--red-bg);color:var(--red);box-shadow:0 3px 0 var(--red-shade);animation:shake .45s ease-in-out}
  .optbtn.opt-wrong .key{background:var(--red);border-color:var(--red-shade);color:#fff;animation:pop .45s var(--ease-spring)}
  @keyframes opt-bounce{0%{transform:translateY(0)}35%{transform:translateY(-6px)}70%{transform:translateY(1px)}100%{transform:translateY(0)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

  .exp{border-radius:14px;border:2px solid transparent;padding:0 17px;line-height:1.7;font-size:14px;display:flex;gap:10px;overflow:hidden;max-height:0;opacity:0;margin-top:0;transition:max-height .5s var(--ease-out),opacity .45s,margin .45s,padding .45s}
  .exp.show{max-height:220px;opacity:1;margin-top:18px;padding-top:14px;padding-bottom:14px}
  .exp.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
  .exp.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}

  /* combo */
  .combo{position:absolute;top:-12px;right:16px;padding:5px 14px;border-radius:9999px;background:var(--orange);color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;box-shadow:0 3px 0 rgba(0,0,0,.25);transform:scale(0)}
  .combo.show{animation:combo-pop .5s var(--ease-spring) forwards}
  .combo.hot{background:var(--red)}
  @keyframes combo-pop{0%{transform:scale(0) rotate(-12deg)}70%{transform:scale(1.25) rotate(4deg)}100%{transform:scale(1) rotate(0)}}

  .qcard{transition:opacity .2s,transform .2s}
  .qcard.leaving{opacity:0;transform:translateX(-26px)}

  /* result terminal lines */
  .tline{display:block;opacity:0;transform:translateY(6px);animation:tline .35s var(--ease-out) forwards;animation-delay:calc(.3s + var(--i)*.3s)}
  @keyframes tline{to{opacity:1;transform:none}}

  /* skill path（Duolingo 風の道） */
  .path-col{display:flex;flex-direction:column;align-items:center;padding:10px 0 4px}
  .path-node{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;translate:var(--x,0px) 0}
  .path-link{width:4px;height:46px;border-radius:2px;background:repeating-linear-gradient(180deg,var(--border) 0 6px,transparent 6px 12px);translate:calc((var(--x1,0px) + var(--x2,0px))/2) 0}
  .node-btn{position:relative;display:grid;place-items:center;width:68px;height:68px;border-radius:9999px;border:0;cursor:pointer;transition:transform .15s var(--ease-spring),filter .15s}
  .node-btn:hover{transform:scale(1.08)}
  .node-done{background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-shade)}
  .node-current{background:var(--blue);color:#fff;box-shadow:0 5px 0 var(--blue-shade)}
  .node-locked{background:var(--well);color:var(--faint);border:2px dashed var(--border-hi) !important;box-shadow:none;cursor:not-allowed}
  .node-halo{position:absolute;inset:-9px;border-radius:9999px;border:3px solid var(--blue);opacity:.55;animation:halo 1.8s ease-out infinite}
  @keyframes halo{0%{transform:scale(.82);opacity:.55}70%{transform:scale(1.12);opacity:0}100%{opacity:0}}
  .node-label{font-size:12px;font-weight:700;color:var(--ink-2);text-align:center;max-width:130px;line-height:1.35}
  .node-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint)}
  .start-tip{position:absolute;top:-38px;left:50%;translate:-50% 0;background:var(--surface);border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:4px 12px;font-size:11px;font-weight:800;letter-spacing:.08em;white-space:nowrap;animation:tip-float 1.6s ease-in-out infinite}
  .start-tip::after{content:'';position:absolute;left:50%;bottom:-6px;translate:-50% 0;width:10px;height:10px;background:var(--surface);border-right:2px solid var(--blue);border-bottom:2px solid var(--blue);transform:rotate(45deg)}
  @keyframes tip-float{0%,100%{translate:-50% 0}50%{translate:-50% -5px}}

  /* achievements */
  .badge{display:inline-flex;align-items:center;gap:8px;padding:7px 13px;border-radius:10px;border:1.5px solid var(--border);background:var(--well);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--ink-2)}
  .badge.locked{opacity:.4;filter:grayscale(1)}
  .toast{position:fixed;right:24px;bottom:24px;z-index:100;display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:16px;background:var(--surface);border:2px solid var(--yellow);box-shadow:0 5px 0 rgba(0,0,0,.28);transform:translateX(130%);transition:transform .55s var(--ease-spring)}
  .toast.show{transform:none}

  /* charts */
  .chart{display:flex;height:180px;align-items:stretch;gap:12px;border:2px solid var(--border);border-radius:14px;padding:16px;background:var(--well)}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
  .bar-area{flex:1;width:100%;display:flex;align-items:flex-end}
  .vbar{width:100%;border-radius:6px 6px 3px 3px;background:var(--blue);height:0;animation:barh .8s var(--ease-out) forwards;animation-delay:calc(.2s + var(--i)*80ms);transition:filter .2s;cursor:pointer}
  .vbar:hover{filter:brightness(1.25)}
  @keyframes barh{to{height:var(--h)}}
  .dist{display:flex;height:16px;border-radius:9999px;overflow:hidden;border:1.5px solid var(--border)}
  .dist>div{width:0;animation:distw 1s var(--ease-out) forwards;animation-delay:.35s}
  @keyframes distw{to{width:var(--w)}}

  /* confetti */
  .confetti-box{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:99}
  .confetti{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:cfall linear forwards}
  @keyframes cfall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(105vh) rotate(660deg)}}

  /* XP bar */
  .xp-wrap{margin-top:auto;padding:13px;border-radius:14px;border:2px solid var(--border);background:var(--well)}

  /* ============ responsive (SP) ============ */
  @media (max-width:920px){
    .app{flex-direction:column;padding:0 16px 96px;gap:16px}
    .sidebar{display:none}
    .appbar{display:flex;align-items:center;justify-content:space-between;padding:14px 2px 2px;position:sticky;top:0;background:var(--bg);z-index:10;transition:background .3s}
    .stat-grid{grid-template-columns:1fr 1fr;gap:12px}
    .two-col{grid-template-columns:1fr !important}
    .page-head h1{font-size:22px}
    .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:2px solid var(--border);padding:8px 6px calc(10px + env(safe-area-inset-bottom));z-index:20;transition:background .3s}
    .tab{flex:1;border:0;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;color:var(--faint);position:relative;transition:color .25s}
    .tab.active{color:var(--blue)}
    .tab.active svg{animation:bounce .45s var(--ease-spring)}
    .tab-badge{position:absolute;top:-2px;right:22px;min-width:16px;height:16px;padding:0 4px;border-radius:9999px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center}
    .chart{height:130px;gap:8px;padding:12px}
    .hero-cta{flex-direction:column;align-items:stretch !important}
    .toast{left:16px;right:16px}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-delay:0ms !important;transition-duration:.01ms !important}
    .reveal,.heat-cell,.tline{opacity:1}
    .bar-fill{width:var(--w)}
    .vbar{height:var(--h)}
  }
</style>
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR (PC) ===== -->
  <aside class="sidebar card">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 2px 18px">
      <div data-go="dashboard" class="go" style="display:flex;align-items:center;gap:11px;cursor:pointer">
        <span class="wiggle" style="display:grid;place-items:center;width:42px;height:42px;border-radius:13px;background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-shade)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
        <div style="line-height:1.25"><div style="font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em">DevPath</div><div class="mono" style="font-size:10.5px;color:var(--faint)">v0.4.2-beta</div></div>
      </div>
      <button class="theme-toggle" aria-label="テーマ切替" title="ライト/ダーク切替"></button>
    </div>
    <nav style="display:flex;flex-direction:column;gap:6px">
      <button class="navitem" data-nav="dashboard" data-go="dashboard"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>ダッシュボード</button>
      <button class="navitem" data-nav="learn" data-go="learn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>教材</button>

/* GitHub 風の草（シード付き擬似乱数で生成、直近12日はストリーク） */
function heatmapHTML(weeks = 26) {
  let s = 42;
  const rand = () => { s = (s * 1664525 + 1013904223) % 4294967296; return s / 4294967296; };
  const total = weeks * 7;
  let cells = '';
  for (let i = 0; i < total; i++) {
    const daysAgo = total - 1 - i;
    let level;
    if (daysAgo < 12) level = 2 + Math.floor(rand() * 3);           // ストリーク中
    else level = rand() < .32 ? 0 : Math.ceil(rand() * 4);          // それ以前
    const count = level === 0 ? 0 : level * 3 + Math.floor(rand() * 3);
    cells += `<span class="heat-cell" style="--i:${i};background:var(--heat${level})" title="${count}問 · ${daysAgo}日前"></span>`;
  }
  return `<div class="heat-grid" style="grid-template-columns:repeat(${weeks},1fr)">${cells}</div>`;
}

        </svg>
      </div>
      <h2 style="margin:22px 0 0;font-size:16px;font-weight:800;color:var(--ink)">週間アクティビティ</h2>
      <div class="chart" style="margin-top:12px">
        ${weekly.map((v, i) => `
        <div class="bar-col">
          <div class="bar-area"><div class="vbar" style="--h:${v}%;--i:${i}" title="${days[i]}: ${v}問"></div></div>
          <span class="mono" style="font-size:10px;color:var(--faint)">${days[i]}</span>
        </div>`).join('')}
      </div>
    </section>
    <section ${rv('card', 'padding:22px')}>
      <h2 style="margin:0;font-size:16px;font-weight:800;color:var(--ink)">SRS 定着度の分布</h2>
      <div class="dist" style="margin-top:14px"><div style="--w:50%;background:var(--green)"></div><div style="--w:31%;background:var(--blue);animation-delay:.55s"></div><div style="--w:19%;background:var(--red);animation-delay:.75s"></div></div>
      <div class="mono" style="margin-top:14px;display:flex;flex-direction:column;gap:11px;font-size:12.5px">
        <div style="display:flex;align-items:center;gap:9px"><span style="width:10px;height:10px;border-radius:3px;background:var(--green)"></span>mastered <span style="color:var(--faint)">ivl≥21d</span><span style="margin-left:auto;font-weight:700;color:var(--ink)"><span data-count="8">0</span></span></div>
        <div style="display:flex;align-items:center;gap:9px"><span style="width:10px;height:10px;border-radius:3px;background:var(--blue)"></span>learning<span style="margin-left:auto;font-weight:700;color:var(--ink)"><span data-count="5">0</span></span></div>
        <div style="display:flex;align-items:center;gap:9px"><span style="width:10px;height:10px;border-radius:3px;background:var(--red)"></span>due<span style="margin-left:auto;font-weight:700;color:var(--ink)"><span data-count="3">0</span></span></div>
      </div>
      <h2 style="margin:22px 0 0;font-size:16px;font-weight:800;color:var(--ink)">間違えやすい問題</h2>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
        <div class="row-press"><span class="key" style="color:var(--blue)">XSS-003</span><span style="font-size:12.5px;color:var(--ink-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">保存型XSSの説明…</span><span class="mono" style="font-size:12px;font-weight:700;color:var(--red);flex:none">46%</span></div>
        <div class="row-press"><span class="key" style="color:var(--blue)">XSS-002</span><span style="font-size:12.5px;color:var(--ink-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Reactのテキスト埋め込み…</span><span class="mono" style="font-size:12px;font-weight:700;color:var(--orange);flex:none">28%</span></div>
        <div class="row-press"><span class="key" style="color:var(--blue)">XSS-001</span><span style="font-size:12.5px;color:var(--ink-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">HTML本文へ表示する際…</span><span class="mono" style="font-size:12px;font-weight:700;color:var(--green);flex:none">12%</span></div>
      </div>
    </section>
  </div>`;
}

function domainsHTML() {
  const nodeInner = n => {
    if (n.state === 'done') return icons.checkBig;
    if (n.state === 'current') return icons.star;
    return icons.lock;
  };
  let prevX = 0;
  const pathHtml = skillPath.map((n, i) => {
    const link = i === 0 ? '' : `<div class="path-link" style="--x1:${prevX}px;--x2:${n.x}px"></div>`;
    prevX = n.x;
    const cls = n.state === 'done' ? 'node-done' : n.state === 'current' ? 'node-current' : 'node-locked';
    return `${link}
    <div class="path-node reveal" style="--x:${n.x}px;--i:${i + 1}">
      <button class="node-btn ${cls}" ${n.state === 'locked' ? 'disabled' : `data-go="${n.state === 'current' ? 'article' : 'learn'}"`} aria-label="${n.label}">
        ${n.state === 'current' ? '<span class="node-halo"></span><span class="start-tip">START</span>' : ''}
        ${nodeInner(n)}
      </button>
      <div class="node-label">${n.label}<div class="node-sub">${n.sub}${n.state === 'current' ? ` · ${n.pct}%` : ''}</div></div>
    </div>`;
  }).join('');
  return `
  <div ${rv('page-head', 'padding:4px 4px 0')}>${termCrumb('devpath tree security')}<h1 style="margin-top:10px">スキルツリー</h1><p>ノードをクリアすると次がアンロック。依存関係つきの学習パスです。</p></div>
  <div class="two-col" style="display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:start">
    <section ${rv('card', 'padding:26px 22px')}>
      <div style="display:flex;align-items:center;justify-content:space-between"><h2 style="margin:0;font-size:16px;font-weight:800;color:var(--ink)">Security パス</h2><span class="chip" style="font-size:11px;font-weight:700;color:var(--green);padding:3px 11px">2/6 done</span></div>
      <div class="path-col">${pathHtml}</div>
    </section>
    <div style="display:flex;flex-direction:column;gap:16px">
      ${domains.slice(1).map((d, i) => `
      <div ${rv('card', 'padding:20px;opacity:.55')}>
        <div style="display:flex;align-items:center;gap:13px">
          <span style="display:grid;place-items:center;width:44px;height:44px;flex:none;border-radius:13px;background:var(--well);border:2px solid var(--border);color:${d.color}">${d.icon}</span>
          <div style="flex:1"><div style="font-size:15px;font-weight:800;color:var(--ink)">${d.name}</div><div class="mono" style="font-size:11px;color:var(--faint)">locked — Security 60% でアンロック</div></div>
          <span style="color:var(--faint)">${icons.lock}</span>
        </div>
      </div>`).join('')}
      <div ${rv('card', 'padding:20px;border-color:var(--purple)')}>
        <div class="mono" style="font-size:11px;font-weight:700;color:var(--purple);letter-spacing:.08em">DAILY QUEST</div>
        <div style="margin-top:8px;font-size:14px;font-weight:700;color:var(--ink)">復習を3問クリアする</div>
        <div class="bar-track" style="margin-top:10px;height:10px"><div class="bar-fill" style="--w:33%;background:var(--purple)"></div></div>
        <div class="mono" style="margin-top:6px;font-size:11px;color:var(--faint);display:flex;justify-content:space-between"><span>1/3</span><span>+15 XP</span></div>
      </div>
    </div>
  </div>`;
}

const screens = {
  dashboard: dashboardHTML, learn: learnHTML, article: articleHTML,
  quizIntro: quizIntroHTML, reviewIntro: reviewIntroHTML,
  exercise: exerciseHTML, result: resultHTML,
  analytics: analyticsHTML, domains: domainsHTML,
};

/* ================= render / transition ================= */
function render() {
  revealIdx = 0;
  view.innerHTML = screens[state.route]();
  window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
  updateNav();
  runCountUps();
  bindView();
  if (state.route === 'exercise') requestAnimationFrame(() => {
    const seg = document.getElementById(`seg-${state.qIndex}`);
    if (seg) seg.classList.add('done');   // 現在の問題まで進行を表示
    updateCombo(false);
  });
}

function go(route) {
  if (route === state.route) { render(); return; }
  if (reduceMotion) { state.route = route; render(); return; }
  view.classList.add('view-exit');
  setTimeout(() => {
    view.classList.remove('view-exit');
    state.route = route;
    render();
  }, 160);
}

function startExercise(mode) {
  state.mode = mode;
  state.qIndex = 0;
  state.answers = questions.map(() => null);
  state.combo = 0;
  state.sessionXp = 0;
  go('exercise');
  if (state.route === 'exercise') render();
}

function updateNav() {
  const r = state.route, m = state.mode, lm = state.lastMode;
  const activeKey =
    r === 'dashboard' ? 'dashboard' :
    (r === 'learn' || r === 'article') ? 'learn' :
    (r === 'quizIntro' || (r === 'exercise' && m === 'quiz') || (r === 'result' && lm === 'quiz')) ? 'quiz' :
    (r === 'reviewIntro' || (r === 'exercise' && m === 'review') || (r === 'result' && lm === 'review')) ? 'review' :
    r === 'analytics' ? 'analytics' :
    r === 'domains' ? 'domains' : '';
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === activeKey);
  });
}

/* ================= animations ================= */
function runCountUps() {
  view.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    if (reduceMotion) { el.textContent = target.toLocaleString(); return; }
    const dur = 900;
    const t0 = performance.now();
    function tick(t) {
      const p = Math.min((t - t0) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased).toLocaleString();
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function updateCombo(pop) {
  const el = document.getElementById('combo');
  if (!el) return;
  if (state.combo >= 2) {
    el.textContent = `COMBO ×${state.combo}${state.combo >= 3 ? ' 🔥' : ''}`;
    el.classList.toggle('hot', state.combo >= 3);
    el.classList.remove('show');
    if (pop) { void el.offsetWidth; el.classList.add('show'); }
    else { el.style.transform = 'scale(1)'; }
  } else {
    el.classList.remove('show');
    el.style.transform = 'scale(0)';
  }
}

function confetti() {
  if (reduceMotion) return;
  const box = document.createElement('div');
  box.className = 'confetti-box';
  const colors = ['#3fb950', '#58a6ff', '#e3b341', '#bc8cff', '#f0883e', '#39c5cf'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('span');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = 2 + Math.random() * 1.6 + 's';
    c.style.animationDelay = Math.random() * .5 + 's';
    c.style.transform = `scale(${.7 + Math.random() * .8})`;
    box.appendChild(c);
  }
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 4600);
}

let toastTimer = null;
function showToast(text) {
  const t = document.getElementById('toast');
  document.getElementById('toastBody').textContent = text;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4500);
}

/* ================= quiz interaction ================= */
function selectOption(i) {
  if (state.route !== 'exercise') return;
  if (state.answers[state.qIndex] !== null) return;
  const q = questions[state.qIndex];
  state.answers[state.qIndex] = i;
  const isCorrect = i === q.correct;

  if (isCorrect) {
    state.combo++;
    state.sessionXp += 10 + (state.combo >= 2 ? 5 : 0);
  } else {
    state.combo = 0;
  }

  view.querySelectorAll('.optbtn').forEach((btn, idx) => {
    btn.classList.add('locked');
    const key = btn.querySelector('.key');
    if (idx === q.correct) { btn.classList.add('opt-correct'); key.innerHTML = icons.checkBold; }
    else if (idx === i) { btn.classList.add('opt-wrong'); key.innerHTML = icons.xBold; }
  });

  updateCombo(isCorrect);

  const exp = view.querySelector('#explanation');
  exp.classList.add(isCorrect ? 'ok' : 'ng');
  exp.innerHTML = `<span class="mono" style="font-weight:700;flex:none">${isCorrect ? `✓ correct ${state.combo >= 2 ? `(+15 XP)` : '(+10 XP)'}` : '✗ wrong'}</span><span style="color:var(--ink-2)">${q.note}</span>`;
  requestAnimationFrame(() => exp.classList.add('show'));

  const next = view.querySelector('#nextBtn');
  next.disabled = false;
  next.focus({ preventScroll: true });
}

function nextQuestion() {
  if (state.answers[state.qIndex] === null) return;
  const card = view.querySelector('#qcard');
  const advance = () => {
    if (state.qIndex < questions.length - 1) {
      state.qIndex++;
      render();
    } else {
      state.lastMode = state.mode;
      state.route = 'result';
      render();
      const score = questions.filter((q, i) => state.answers[i] === q.correct).length;
      if (score === questions.length) {
        setTimeout(confetti, 1600);
        setTimeout(() => showToast('clean-build — 全問正解でセッション完了 ✨'), 2100);
      }
    }
  };
  if (reduceMotion || !card) { advance(); return; }
  card.classList.add('leaving');
  setTimeout(advance, 180);
}

/* ================= event wiring ================= */
function bindView() {
  view.querySelectorAll('[data-opt]').forEach(btn => {
    btn.addEventListener('click', () => selectOption(parseInt(btn.dataset.opt, 10)));
  });
  const next = view.querySelector('#nextBtn');
  if (next) next.addEventListener('click', nextQuestion);
}

document.addEventListener('click', ev => {
  const tt = ev.target.closest('.theme-toggle');
  if (tt) { setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'); return; }

  const starter = ev.target.closest('[data-start]');
  if (starter) { startExercise(starter.dataset.start); return; }

  const goer = ev.target.closest('[data-go]');
  if (goer && !goer.disabled) { go(goer.dataset.go); return; }
});

document.addEventListener('keydown', ev => {
  if (state.route !== 'exercise') return;
  if (ev.key >= '1' && ev.key <= '4') selectOption(parseInt(ev.key, 10) - 1);
  if (ev.key === 'Enter') nextQuestion();
});

/* ================= boot（ダークファースト） ================= */
let initialTheme = 'dark';
try { initialTheme = localStorage.getItem('devpath-nf-theme') || 'dark'; } catch (e) {}
setTheme(initialTheme);
render();
</script>
</body>
</html>
