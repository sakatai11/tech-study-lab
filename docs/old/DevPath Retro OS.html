<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevPath — Retro OS Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ==========================================================
     Design tokens — DevPath OS（レトロOS × ターミナル）
     Win9x/XP のクロム（ベベル・ティール壁紙・タスクバー）
     × GitHub の計器盤（草・ストリーク・数値）
     × ターミナルのシンタックスカラー
     ライト/ダーク切替は廃止。レトロテーマ一本。
     ========================================================== */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  :root{
    --desktop:#0e7373;
    --win-face:#d4d0c8; --ctrl-face:#c0c0c0;
    --bevel-lt:#ffffff; --bevel-mid:#808080; --bevel-dk:#404040;
    --title-active:linear-gradient(90deg,#000080,#1084d0);
    --title-inactive:linear-gradient(90deg,#808080,#b5b5b5);
    --ink:#1a1a1a; --mute:#5a5a5a; --faint:#8a8a8a;
    --term-bg:#0c0c0c; --term-ink:#cccccc;
    --green:#39d353; --red:#f85149; --yellow:#e3b341; --purple:#bc8cff; --blue:#58a6ff;
    --navy:#000080;
    --sel-bg:#000080; --sel-ink:#ffffff;
    --heat0:#ebedf0; --heat1:#9be9a8; --heat2:#40c463; --heat3:#30a14e; --heat4:#216e39;
    --ok-ink:#0a7a2f; --ok-bg:#d8efd8;
    --ng-ink:#c22525; --ng-bg:#f3d9d9;
    --dom-security:#0a7a2f; --dom-frontend:#1084d0; --dom-backend:#6a3fa0; --dom-arch:#9a6700;
    --ease-spring:cubic-bezier(.34,1.56,.64,1);
  }
  body{background:var(--desktop);font-family:'Inter',system-ui,sans-serif;color:var(--ink);font-size:13px}
  button{font-family:inherit}
  .mono{font-family:'JetBrains Mono',monospace}
  :focus-visible{outline:1px dotted var(--ink);outline-offset:-3px}

  /* ============ desktop / scanlines / boot ============ */
  .desktop{min-height:100vh;background:
    radial-gradient(circle at 18% 12%,rgba(255,255,255,.05),transparent 55%),
    repeating-conic-gradient(from 0deg,rgba(255,255,255,.02) 0deg 90deg,transparent 90deg 180deg) 0 0/6px 6px,
    var(--desktop);
  }
  .scanlines{position:fixed;inset:0;pointer-events:none;z-index:9997;background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0 1px,transparent 1px 3px)}
  .scanlines.off{opacity:0}
  #boot{position:fixed;inset:0;background:#000;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:14px;padding:12vh 8vw;z-index:9999;cursor:pointer;display:flex;flex-direction:column;gap:9px}
  #boot.hide{opacity:0;transition:opacity .4s ease}
  .bline{opacity:0;animation:blineIn .18s ease forwards;animation-delay:calc(var(--i)*250ms)}
  @keyframes blineIn{to{opacity:1}}

  /* ============ window chrome ============ */
  .view-area{display:flex;flex-direction:column;gap:18px;max-width:1180px;margin:0 auto;padding:22px 22px 116px}
  .win{background:var(--win-face);border:2px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);box-shadow:1px 1px 0 var(--bevel-mid),4px 4px 0 rgba(0,0,0,.25)}
  .win-title{height:26px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 4px 0 9px;background:var(--title-active)}
  .win.inactive .win-title{background:var(--title-inactive)}
  .win-title-text{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .win-ctrls{display:flex;gap:3px;flex:none}
  .win-btn{width:16px;height:14px;display:grid;place-items:center;background:var(--ctrl-face);border:1px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);font-size:9px;line-height:1;color:#000;cursor:default}
  .win-btn.close{cursor:pointer}
  .win-btn.close:active{border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk)}
  .win-body{padding:16px}

  /* ============ stagger / motion — 「開く」感 ============ */
  .reveal{opacity:0;animation:winopen .35s ease-out forwards;animation-delay:calc(var(--i,0)*70ms)}
  @keyframes winopen{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .view-exit{animation:sink .14s ease-in forwards}
  @keyframes sink{to{opacity:0;transform:scale(.97)}}
  .wiggle{animation:wiggle 2.6s ease-in-out infinite}
  @keyframes wiggle{0%,100%{transform:rotate(0)}8%{transform:rotate(-8deg)}16%{transform:rotate(8deg)}24%{transform:rotate(0)}}
  .bounce{animation:bounce .5s var(--ease-spring)}
  @keyframes bounce{0%{transform:translateY(0)}35%{transform:translateY(-6px)}70%{transform:translateY(2px)}100%{transform:translateY(0)}}

  /* ============ bevel button (.btn95) ============ */
  .btn95{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:var(--ctrl-face);border:2px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);box-shadow:1px 1px 0 var(--bevel-mid);font-weight:700;font-size:13px;color:var(--ink);cursor:pointer}
  .btn95:active{border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);translate:1px 1px}
  .btn95[disabled]{opacity:.5;cursor:not-allowed;translate:0 0}
  .btn95.primary{box-shadow:1px 1px 0 var(--bevel-mid),inset 0 0 0 1.5px var(--ink)}
  .btn95.ghost95{font-weight:600}

  /* ============ keycap ============ */
  .key{display:inline-grid;place-items:center;min-width:24px;height:22px;padding:0 6px;background:var(--ctrl-face);border:2px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);font-size:11.5px;font-weight:700;color:var(--ink)}

  /* ============ terminal breadcrumb ============ */
  .term-crumb{font-size:12px;color:rgba(255,255,255,.68);display:flex;align-items:center;gap:2px;flex-wrap:wrap;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
  .term-crumb .p{color:#39d353;margin-right:6px;font-weight:700}
  .cursor{display:inline-block;width:7px;height:14px;background:#39d353;margin-left:6px;animation:blink 1.1s steps(1) infinite;vertical-align:-2px}
  @keyframes blink{50%{opacity:0}}
  .blink-tag{animation:blink 1s steps(1) infinite;color:var(--navy);font-weight:700}

  /* ============ terminal panel (win chrome, black body) ============ */
  .win.term .win-body{background:var(--term-bg);color:var(--term-ink);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.8;padding:16px 18px;overflow-x:auto;white-space:pre-wrap}

  /* ============ layout helpers ============ */
  .win-grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .stat-grid95{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat-tile{background:#fff;border:2px solid;border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);padding:12px 14px}
  .stat-tile .stv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--ink)}
  .stat-tile .stl{margin-top:4px;font-size:11.5px;color:var(--mute)}
  .well95{background:#fff;border:2px solid;border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);padding:14px}

  /* ============ Win9x progress bar ============ */
  .pbar-track{height:16px;background:#fff;border:2px solid;border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);padding:2px}
  .pbar-fill{height:100%;width:0;background:repeating-linear-gradient(90deg,var(--navy) 0 9px,transparent 9px 12px);animation:pbarfill 1s steps(12) forwards;animation-delay:calc(.2s + var(--i,0)*90ms)}
  @keyframes pbarfill{to{width:var(--w)}}

  /* ============ heatmap（草） ============ */
  .heat-grid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px}
  .heat-cell{width:100%;aspect-ratio:1;border-radius:1.5px;background:var(--heat0);opacity:0;animation:heat-in .3s forwards;animation-delay:calc(var(--i)*4ms)}
  @keyframes heat-in{to{opacity:1}}

  /* ============ row (clickable list row) ============ */
  .row95{display:flex;align-items:center;gap:10px;padding:9px 6px;cursor:pointer}
  .row95:hover{background:var(--sel-bg);color:var(--sel-ink)}
  .row95:hover .mono{color:inherit}

  /* ============ achievement chip ============ */
  .achip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--ctrl-face);border:2px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);font-size:11.5px;font-weight:700;color:var(--ink)}
  .achip.locked{opacity:.42;filter:grayscale(1)}

  /* ============ quiz options ============ */
  .optbtn{display:flex;width:100%;align-items:center;gap:12px;background:var(--ctrl-face);border:2px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);box-shadow:1px 1px 0 var(--bevel-mid);padding:13px 16px;text-align:left;cursor:pointer;color:var(--ink);font-size:14px;font-weight:600}
  .optbtn:not(.locked):hover{background:var(--sel-bg);color:var(--sel-ink)}
  .optbtn:not(.locked):hover .key{background:var(--sel-bg);color:var(--sel-ink);border-color:#fff #000 #000 #fff}
  .optbtn:not(.locked):active{translate:1px 1px}
  .optbtn.locked{opacity:1;cursor:default}
  .optbtn.locked:not(.opt-correct):not(.opt-wrong){opacity:.45}
  .optbtn.opt-correct{background:var(--ok-bg);color:var(--ok-ink);border-color:var(--ok-ink);box-shadow:1px 1px 0 var(--bevel-mid);animation:opt-pop .4s ease}
  .optbtn.opt-correct .key{background:var(--ok-ink);color:#fff;border-color:var(--ok-ink)}
  .optbtn.opt-wrong{background:var(--ng-bg);color:var(--ng-ink);border-color:var(--ng-ink);box-shadow:1px 1px 0 var(--bevel-mid);animation:opt-shake .4s ease}
  .optbtn.opt-wrong .key{background:var(--ng-ink);color:#fff;border-color:var(--ng-ink)}
  @keyframes opt-pop{0%{transform:scale(.96)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
  @keyframes opt-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}

  /* ============ system message box（旧 .exp） ============ */
  .exp{border:1px solid var(--ink);padding:0 14px;line-height:1.7;font-size:13.5px;display:flex;gap:10px;overflow:hidden;max-height:0;opacity:0;margin-top:0;transition:max-height .45s ease,opacity .4s,margin .4s,padding .4s}
  .exp.show{max-height:240px;opacity:1;margin-top:18px;padding-top:13px;padding-bottom:13px}
  .exp.ok{background:var(--ok-bg);color:var(--ok-ink)}
  .exp.ng{background:var(--ng-bg);color:var(--ng-ink)}

  /* ============ combo badge ============ */
  .combo{position:absolute;top:-14px;right:16px;padding:4px 13px;background:var(--ctrl-face);border:2px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);box-shadow:1px 1px 0 var(--bevel-mid),3px 3px 0 rgba(0,0,0,.25);font-weight:700;font-size:13px;color:#9a5b00;transform:scale(0)}
  .combo.show{animation:combo-pop .5s var(--ease-spring) forwards}
  .combo.hot{color:var(--ng-ink)}
  @keyframes combo-pop{0%{transform:scale(0) rotate(-10deg)}70%{transform:scale(1.22) rotate(4deg)}100%{transform:scale(1) rotate(0)}}

  .qcard{transition:opacity .18s,transform .18s}
  .qcard.leaving{opacity:0;transform:scale(.97)}

  /* ============ progress segments（設問インジケータ） ============ */
  .seg-track{display:flex;gap:4px}
  .seg{flex:1;height:12px;background:#fff;border:2px solid;border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);overflow:hidden;position:relative}
  .seg .seg-fill{position:absolute;inset:0;background:var(--navy);transform:scaleX(0);transform-origin:left;transition:transform .5s steps(6)}
  .seg.done .seg-fill{transform:scaleX(1)}

  /* ============ result terminal lines ============ */
  .tline{display:block;opacity:0;transform:translateY(4px);animation:tline .3s ease-out forwards;animation-delay:calc(.3s + var(--i)*.3s)}
  @keyframes tline{to{opacity:1;transform:none}}

  /* ============ directory tree（explorer） ============ */
  .tree-root{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink);margin-bottom:6px;font-weight:700}
  .tree-row{font-family:'JetBrains Mono',monospace;font-size:13px;padding:4px 6px;display:flex;align-items:center;gap:6px;white-space:pre;flex-wrap:wrap}
  .tree-row.go{cursor:pointer}
  .tree-row.go:hover{background:var(--sel-bg);color:var(--sel-ink)}
  .tree-row.go:hover .tree-mark,.tree-row.go:hover .tree-tail{color:inherit}
  .tree-done .tree-mark{color:var(--ok-ink)}
  .tree-current .tree-mark{color:var(--navy);font-weight:700}
  .tree-locked{color:var(--faint);cursor:not-allowed}
  .tree-locked .tree-mark{color:var(--faint)}
  .tree-tail{margin-left:auto;color:var(--mute);font-size:12px}
  .tree-current .tree-tail{color:var(--ink)}
  .drive-row{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--mute);padding:4px 2px}
  .drive-note{color:var(--faint)}
  .notepad-body{background:#fff;border:2px solid;border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);padding:14px;font-size:13px;line-height:1.9;color:var(--ink)}
  .quest-bar{color:var(--navy);letter-spacing:1px}

  /* ============ charts ============ */
  .chart95{display:flex;height:150px;align-items:stretch;gap:10px;border:2px solid;border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);border-radius:0;padding:14px;background:#fff}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
  .bar-area{flex:1;width:100%;display:flex;align-items:flex-end}
  .vbar95{width:100%;height:0;background:repeating-linear-gradient(0deg,var(--navy) 0 6px,transparent 6px 9px);animation:barh .8s ease-out forwards;animation-delay:calc(.2s + var(--i)*80ms)}
  @keyframes barh{to{height:var(--h)}}
  .dist95{display:flex;height:16px;overflow:hidden;border:1.5px solid var(--bevel-dk)}
  .dist95>div{width:0;animation:distw 1s ease-out forwards;animation-delay:.35s}
  @keyframes distw{to{width:var(--w)}}

  /* ============ confetti ============ */
  .confetti-box{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9990}
  .confetti{position:absolute;top:-14px;width:9px;height:14px;border-radius:1px;animation:cfall linear forwards}
  @keyframes cfall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(105vh) rotate(660deg)}}

  /* ============ XP balloon（実績吹き出し） ============ */
  .toast{position:fixed;right:20px;bottom:58px;z-index:9995;max-width:300px;padding:12px 16px;background:#ffffe1;border:1px solid #1a1a1a;border-radius:4px;box-shadow:2px 2px 0 rgba(0,0,0,.2);transform:translate(12px,10px) scale(.85);opacity:0;transition:transform .4s var(--ease-spring),opacity .3s}
  .toast::after{content:'';position:absolute;left:26px;bottom:-9px;width:0;height:0;border:9px solid transparent;border-top-color:#ffffe1;border-bottom:0}
  .toast.show{transform:translate(0,0) scale(1);opacity:1}
  .toast-close{position:absolute;top:4px;right:7px;border:0;background:transparent;cursor:pointer;font-size:11px;color:var(--mute);line-height:1}
  .toast-title{font-size:11px;font-weight:700;color:#7a5c00;letter-spacing:.04em}
  .toast-body{margin-top:4px;font-size:12.5px;font-weight:600;color:var(--ink)}

  /* ============ taskbar ============ */
  .taskbar{position:fixed;left:0;right:0;bottom:0;height:42px;background:var(--ctrl-face);border-top:2px solid var(--bevel-lt);box-shadow:0 -1px 0 var(--bevel-mid);display:flex;align-items:center;gap:8px;padding:0 8px;z-index:50}
  .start-btn{height:30px;flex:none;font-size:13px}
  .task-btns{display:flex;gap:6px;flex:1;min-width:0;overflow-x:auto;scrollbar-width:none}
  .task-btns::-webkit-scrollbar{display:none}
  .task-btn{position:relative;flex:none;display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 10px;background:var(--ctrl-face);border:2px solid;border-color:var(--bevel-lt) var(--bevel-dk) var(--bevel-dk) var(--bevel-lt);font-weight:600;font-size:12.5px;color:var(--ink);cursor:pointer}
  .task-btn.active{border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);background:repeating-conic-gradient(#d4d0c8 0 25%,#c8c4bc 0 50%) 0 0/4px 4px}
  .task-badge{position:absolute;top:-6px;right:-4px;min-width:16px;height:16px;padding:0 3px;background:var(--ng-ink);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border-radius:9999px;border:1px solid #7a1414}
  .tray{display:flex;align-items:center;gap:6px;flex:none}
  .tray-well{display:flex;align-items:center;gap:9px;background:#b9b5ad;border:2px solid;border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk);padding:4px 10px;height:26px;font-size:11.5px;font-weight:700;color:var(--ink)}
  .crt-btn{height:24px;padding:0 8px;font-size:10.5px}
  .crt-btn.active{border-color:var(--bevel-dk) var(--bevel-lt) var(--bevel-lt) var(--bevel-dk)}
  @media(min-width:921px){.task-btn .short{display:none}}

  /* ============ responsive (SP) ============ */
  @media(max-width:920px){
    .view-area{padding:14px 14px 116px}
    .stat-grid95{grid-template-columns:1fr 1fr}
    .win-grid2{grid-template-columns:1fr}
    .chart95{height:120px;gap:6px;padding:10px}
    .task-btn .full{display:none}
    .task-btn .short{display:inline}
    .task-btn{padding:0 8px;font-size:11px}
    .taskbar{gap:4px}
    .toast{left:14px;right:14px;max-width:none}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-delay:0ms !important;transition-duration:.01ms !important}
    .reveal,.heat-cell,.tline{opacity:1}
    .pbar-fill{width:var(--w)}
    .vbar95{height:var(--h)}
  }
</style>
</head>
<body>

<div class="scanlines" id="scanlines"></div>

<div id="boot" aria-hidden="true">
  <div class="bline" style="--i:0">DevPath BIOS v0.4.2</div>
  <div class="bline" style="--i:1">Memory check ......... 640K OK</div>
  <div class="bline" style="--i:2">Loading SRS engine ... OK</div>
  <div class="bline" style="--i:3">Mounting content/ .... 4 domains found</div>
  <div class="bline" style="--i:4">Starting desktop ...</div>
</div>

<div class="desktop">
  <main id="view" class="view-area"></main>
</div>

<!-- ===== TASKBAR ===== -->
<nav class="taskbar">
  <button class="btn95 start-btn" data-go="dashboard">◆ DevPath</button>
  <div class="task-btns">
    <button class="task-btn" data-nav="dashboard" data-go="dashboard">🖥 <span class="full">ダッシュボード</span><span class="short">ボード</span></button>
    <button class="task-btn" data-nav="learn" data-go="learn">📄 <span class="full">教材</span><span class="short">教材</span></button>
    <button class="task-btn" data-nav="quiz" data-go="quizIntro">✏️ <span class="full">演習</span><span class="short">演習</span></button>
    <button class="task-btn" data-nav="review" data-go="reviewIntro">🔁 <span class="full">復習</span><span class="short">復習</span><span class="task-badge">3</span></button>
    <button class="task-btn" data-nav="analytics" data-go="analytics">📊 <span class="full">アナリティクス</span><span class="short">解析</span></button>
    <button class="task-btn" data-nav="domains" data-go="domains">📁 <span class="full">エクスプローラ</span><span class="short">Tree</span></button>
  </div>
  <div class="tray">
    <button class="btn95 crt-btn active mono" id="crtToggle" aria-pressed="true" title="CRTスキャンライン ON/OFF">CRT</button>
    <div class="tray-well mono">
      <span>🔥12</span><span>Lv.8</span><span id="clock">--:--</span>
    </div>
  </div>
</nav>

<!-- ===== XP balloon（実績通知） ===== -->
<div class="toast" id="toast" role="status">
  <button class="toast-close" id="toastClose" aria-label="閉じる">✕</button>
  <div class="toast-title mono">🏆 ACHIEVEMENT UNLOCKED</div>
  <div class="toast-body mono" id="toastBody"></div>
</div>

<script>
'use strict';

/* ================= helpers ================= */
let revealIdx = 0;
function rv(extraClass = '', extraStyle = '') {
  return `class="reveal ${extraClass}" style="--i:${revealIdx++};${extraStyle}"`;
}

function termCrumb(cmd) {
  return `<div class="term-crumb">${'<span class="p">~/devpath $</span>'}<span>${cmd}</span><span class="cursor"></span></div>`;
}

function winTitleBar(title) {
  return `<div class="win-title"><span class="win-title-text mono">${title}</span><span class="win-ctrls"><span class="win-btn">─</span><span class="win-btn">□</span><span class="win-btn close" data-winclose>✕</span></span></div>`;
}
function win(title, bodyHtml, extraClass = '', extraStyle = '', bodyStyle = '') {
  return `<div ${rv(`win ${extraClass}`, extraStyle)}>${winTitleBar(title)}<div class="win-body" style="${bodyStyle}">${bodyHtml}</div></div>`;
}

function miniBar(pct) {
  const filled = Math.round(pct / 10);
  return '█'.repeat(filled) + '░'.repeat(10 - filled);
}

/* GitHub 風の草（シード付き擬似乱数で生成、直近12日はストリーク） */
function heatmapHTML(weeks = 26) {
  let s = 42;
  const rand = () => { s = (s * 1664525 + 1013904223) % 4294967296; return s / 4294967296; };
  const total = weeks * 7;
  let cells = '';
  for (let i = 0; i < total; i++) {
    const daysAgo = total - 1 - i;
    let level;
    if (daysAgo < 12) level = 2 + Math.floor(rand() * 3);           // ストリーク中
    else level = rand() < .32 ? 0 : Math.ceil(rand() * 4);          // それ以前
    const count = level === 0 ? 0 : level * 3 + Math.floor(rand() * 3);
    cells += `<span class="heat-cell" style="--i:${i};background:var(--heat${level})" title="${count}問 · ${daysAgo}日前"></span>`;
  }
  return `<div class="heat-grid" style="grid-template-columns:repeat(${weeks},1fr)">${cells}</div>`;
}

}

function domainsHTML() {
  const nodeMark = n => n.state === 'done' ? '✓' : n.state === 'current' ? '▶' : glyph.lock;
  const treeRows = skillPath.map((n, i) => {
    const last = i === skillPath.length - 1;
    const prefix = last ? '└─ ' : '├─ ';
    const clickable = n.state !== 'locked';
    let tail;
    if (n.state === 'done') tail = '[done]';
    else if (n.state === 'current') tail = `[${n.pct}%] ${miniBar(n.pct)} <span class="blink-tag">← START</span>`;
    else tail = '[locked]';
    const cls = n.state === 'done' ? 'tree-done' : n.state === 'current' ? 'tree-current' : 'tree-locked';

  }).join('');

  const lockedDrives = domains.slice(1).map(d => `<div class="drive-row">${d.drive}:\\${d.name.toLowerCase()}\\ <span class="drive-note">(locked — Security ${domains[0].pct}% でアンロック)</span></div>`).join('');

    ${win('explorer.exe — C:\\devpath\\', `

      <div class="tree-root">C:\\devpath\\security\\</div>
      ${treeRows}`)}
    <div style="display:flex;flex-direction:column;gap:16px">

      ${win('quest.txt — メモ帳', `<div class="notepad-body mono">復習を3問クリアする<br>1/3 <span class="quest-bar">██░░░░</span><br>+15 XP</div>`, 'inactive')}

const screens = {
  dashboard: dashboardHTML, learn: learnHTML, article: articleHTML,
  quizIntro: quizIntroHTML, reviewIntro: reviewIntroHTML,
  exercise: exerciseHTML, result: resultHTML,
  analytics: analyticsHTML, domains: domainsHTML,
};

/* ================= render / transition ================= */
function render() {
  revealIdx = 0;
  view.innerHTML = screens[state.route]();
  window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
  updateNav();
  runCountUps();
  bindView();
  if (state.route === 'exercise') requestAnimationFrame(() => {
    const seg = document.getElementById(`seg-${state.qIndex}`);
    if (seg) seg.classList.add('done');   // 現在の問題まで進行を表示
    updateCombo(false);
  });
}

function go(route) {
  if (route === state.route) { render(); return; }
  if (reduceMotion) { state.route = route; render(); return; }
  view.classList.add('view-exit');
  setTimeout(() => {
    view.classList.remove('view-exit');
    state.route = route;
    render();
  }, 140);
}

function startExercise(mode) {
  state.mode = mode;
  state.qIndex = 0;
  state.answers = questions.map(() => null);
  state.combo = 0;
  state.sessionXp = 0;
  go('exercise');
  if (state.route === 'exercise') render();
}

function updateNav() {
  const r = state.route, m = state.mode, lm = state.lastMode;
  const activeKey =
    r === 'dashboard' ? 'dashboard' :
    (r === 'learn' || r === 'article') ? 'learn' :
    (r === 'quizIntro' || (r === 'exercise' && m === 'quiz') || (r === 'result' && lm === 'quiz')) ? 'quiz' :
    (r === 'reviewIntro' || (r === 'exercise' && m === 'review') || (r === 'result' && lm === 'review')) ? 'review' :
    r === 'analytics' ? 'analytics' :
    r === 'domains' ? 'domains' : '';
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === activeKey);
  });
}

/* ================= animations ================= */
function runCountUps() {
  view.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    if (reduceMotion) { el.textContent = target.toLocaleString(); return; }
    const dur = 900;
    const t0 = performance.now();
    function tick(t) {
      const p = Math.min((t - t0) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased).toLocaleString();
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function updateCombo(pop) {
  const el = document.getElementById('combo');
  if (!el) return;
  if (state.combo >= 2) {
    el.textContent = `COMBO ×${state.combo}${state.combo >= 3 ? ' 🔥' : ''}`;
    el.classList.toggle('hot', state.combo >= 3);
    el.classList.remove('show');
    if (pop) { void el.offsetWidth; el.classList.add('show'); }
    else { el.style.transform = 'scale(1)'; }
  } else {
    el.classList.remove('show');
    el.style.transform = 'scale(0)';
  }
}

function confetti() {
  if (reduceMotion) return;
  const box = document.createElement('div');
  box.className = 'confetti-box';
  const colors = ['#39d353', '#58a6ff', '#e3b341', '#bc8cff', '#c2570a', '#000080'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('span');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = 2 + Math.random() * 1.6 + 's';
    c.style.animationDelay = Math.random() * .5 + 's';
    c.style.transform = `scale(${.7 + Math.random() * .8})`;
    box.appendChild(c);
  }
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 4600);
}

let toastTimer = null;
function showToast(text) {
  const t = document.getElementById('toast');
  document.getElementById('toastBody').textContent = text;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
}

/* ================= quiz interaction ================= */
function selectOption(i) {
  if (state.route !== 'exercise') return;
  if (state.answers[state.qIndex] !== null) return;
  const q = questions[state.qIndex];
  state.answers[state.qIndex] = i;
  const isCorrect = i === q.correct;

  if (isCorrect) {
    state.combo++;
    state.sessionXp += 10 + (state.combo >= 2 ? 5 : 0);
  } else {
    state.combo = 0;
  }

  view.querySelectorAll('.optbtn').forEach((btn, idx) => {
    btn.classList.add('locked');
    const key = btn.querySelector('.key');
    if (idx === q.correct) { btn.classList.add('opt-correct'); key.textContent = glyph.checkBold; }
    else if (idx === i) { btn.classList.add('opt-wrong'); key.textContent = glyph.xBold; }
  });

  updateCombo(isCorrect);

  const exp = view.querySelector('#explanation');
  exp.classList.add(isCorrect ? 'ok' : 'ng');
  exp.innerHTML = `<span class="mono" style="font-weight:700;flex:none">${isCorrect ? `✓ correct ${state.combo >= 2 ? `(+15 XP)` : '(+10 XP)'}` : '✗ wrong'}</span><span>${q.note}</span>`;
  requestAnimationFrame(() => exp.classList.add('show'));

  const next = view.querySelector('#nextBtn');
  next.disabled = false;
  next.focus({ preventScroll: true });
}

function nextQuestion() {
  if (state.answers[state.qIndex] === null) return;
  const card = view.querySelector('#qcard');
  const advance = () => {
    if (state.qIndex < questions.length - 1) {
      state.qIndex++;
      render();
    } else {
      state.lastMode = state.mode;
      state.route = 'result';
      render();
      const score = questions.filter((q, i) => state.answers[i] === q.correct).length;
      if (score === questions.length) {
        setTimeout(confetti, 1600);
        setTimeout(() => showToast('clean-build — 全問正解でセッション完了 ✨'), 2100);
      }
    }
  };
  if (reduceMotion || !card) { advance(); return; }
  card.classList.add('leaving');
  setTimeout(advance, 160);
}

/* ================= event wiring ================= */
function bindView() {
  view.querySelectorAll('[data-opt]').forEach(btn => {
    btn.addEventListener('click', () => selectOption(parseInt(btn.dataset.opt, 10)));
  });
  const next = view.querySelector('#nextBtn');
  if (next) next.addEventListener('click', nextQuestion);
}

document.addEventListener('click', ev => {
  const closer = ev.target.closest('[data-winclose]');
  if (closer) { go(state.route === 'exercise' ? 'quizIntro' : 'dashboard'); return; }

  const crt = ev.target.closest('#crtToggle');
  if (crt) {
    const on = crt.classList.toggle('active');
    crt.setAttribute('aria-pressed', String(on));
    document.getElementById('scanlines').classList.toggle('off', !on);
    return;
  }

  const toastClose = ev.target.closest('#toastClose');
  if (toastClose) { document.getElementById('toast').classList.remove('show'); return; }

  const starter = ev.target.closest('[data-start]');
  if (starter) { startExercise(starter.dataset.start); return; }

  const goer = ev.target.closest('[data-go]');
  if (goer && !goer.disabled) { go(goer.dataset.go); return; }
});

document.addEventListener('keydown', ev => {
  if (state.route !== 'exercise') return;
  if (ev.key >= '1' && ev.key <= '4') selectOption(parseInt(ev.key, 10) - 1);
  if (ev.key === 'Enter') nextQuestion();
});

/* ================= system tray clock ================= */
function updateClock() {
  const el = document.getElementById('clock');
  if (!el) return;
  const d = new Date();
  el.textContent = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
updateClock();
setInterval(updateClock, 60000);

/* ================= boot sequence ================= */
function bootThenRender() {
  const bootEl = document.getElementById('boot');
  let already = false;
  try { already = sessionStorage.getItem('devpath-booted') === '1'; } catch (e) {}
  if (already || reduceMotion) {
    bootEl.style.display = 'none';
    render();
    return;
  }
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    try { sessionStorage.setItem('devpath-booted', '1'); } catch (e) {}
    bootEl.classList.add('hide');
    setTimeout(() => { bootEl.style.display = 'none'; }, 420);
    render();
  };
  bootEl.addEventListener('click', finish);
  setTimeout(finish, 1800);
}

bootThenRender();
</script>
