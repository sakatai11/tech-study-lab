<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevPath — Soft UI Hybrid Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ==========================================================
     Design tokens — Soft UI Hybrid
     面（カード・背景）はニューモーフィズム、
     操作要素（ボタン・選択肢・ナビ）はフラット＋境界線＋塗り。
     コントラストは WCAG AA を基準に設定。
     ========================================================== */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  :root{
    /* surface */
    --bg:#e8ecf2; --surface:#e8ecf2; --well:#e2e7ee;
    --nm-dark:#cfd6e0; --nm-light:#ffffff;
    --border:rgba(31,40,56,.10); --border-strong:rgba(31,40,56,.18);
    /* ink (AA contrast on --bg) */
    --ink:#1f2838; --ink-2:#39455a; --mute:#57647b; --faint:#7d8ca3;
    /* accent */
    --accent:#1a73e8; --accent-hi:#3f8bf5; --accent-glow:rgba(26,115,232,.35);
    --accent-soft:rgba(26,115,232,.10);
    /* semantic (AA on --bg) */
    --ok:#157a47; --ok-bg:rgba(21,122,71,.10);
    --warn:#96610b; --ng:#c22525; --ng-bg:rgba(194,37,37,.09);
    /* depth / motion */
    --nm-d:5px;
    --shadow-card:var(--nm-d) var(--nm-d) calc(var(--nm-d)*2.6) var(--nm-dark), calc(var(--nm-d)*-1) calc(var(--nm-d)*-1) calc(var(--nm-d)*2.6) var(--nm-light);
    --ease-out:cubic-bezier(.22,1,.36,1);
    --ease-spring:cubic-bezier(.34,1.56,.64,1);
  }
  :root[data-theme="dark"]{
    --bg:#1a1f2b; --surface:#202636; --well:#1c2230;
    --nm-dark:rgba(0,0,0,.42); --nm-light:rgba(255,255,255,.045);
    --border:rgba(255,255,255,.09); --border-strong:rgba(255,255,255,.16);
    --ink:#eaeef7; --ink-2:#c8d1e0; --mute:#97a3b9; --faint:#6d7a92;
    --accent:#5b9bf5; --accent-hi:#7cb0f8; --accent-glow:rgba(91,155,245,.28);
    --accent-soft:rgba(91,155,245,.14);
    --ok:#3fc482; --ok-bg:rgba(63,196,130,.13);
    --warn:#e3a83f; --ng:#f2685f; --ng-bg:rgba(242,104,95,.13);
  }
  body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--ink-2);transition:background .35s,color .35s}
  button{font-family:inherit}
  .mono{font-family:'JetBrains Mono',monospace}

  /* focus ring — すべての操作要素に可視フォーカスを保証 */
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

  /* ============ surfaces ============ */
  .nm{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-card);transition:background .35s,border-color .35s}
  .nm-sm{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:calc(var(--nm-d)*.7) calc(var(--nm-d)*.7) calc(var(--nm-d)*1.6) var(--nm-dark), calc(var(--nm-d)*-.7) calc(var(--nm-d)*-.7) calc(var(--nm-d)*1.6) var(--nm-light)}
  .nm-in{background:var(--well);border-radius:14px;box-shadow:inset calc(var(--nm-d)*.7) calc(var(--nm-d)*.7) calc(var(--nm-d)*1.5) var(--nm-dark), inset calc(var(--nm-d)*-.7) calc(var(--nm-d)*-.7) calc(var(--nm-d)*1.5) var(--nm-light)}
  .nm-in-sm{background:var(--well);border-radius:9999px;box-shadow:inset calc(var(--nm-d)*.45) calc(var(--nm-d)*.45) calc(var(--nm-d)*.9) var(--nm-dark), inset calc(var(--nm-d)*-.45) calc(var(--nm-d)*-.45) calc(var(--nm-d)*.9) var(--nm-light)}
  .chip{display:inline-block;border:1px solid var(--border-strong);border-radius:9999px;background:var(--well)}

  /* ============ interactive ============ */
  .lift{transition:transform .3s var(--ease-out), box-shadow .3s var(--ease-out), border-color .2s}
  .lift:hover{transform:translateY(-3px);border-color:var(--border-strong);box-shadow:calc(var(--nm-d)*1.3) calc(var(--nm-d)*1.3) calc(var(--nm-d)*3) var(--nm-dark), calc(var(--nm-d)*-1.3) calc(var(--nm-d)*-1.3) calc(var(--nm-d)*3) var(--nm-light)}

  .btn-primary{position:relative;overflow:hidden;border:1px solid transparent;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;box-shadow:0 6px 16px var(--accent-glow);transition:background .2s,transform .25s var(--ease-out),box-shadow .25s var(--ease-out),opacity .3s}
  .btn-primary:hover{background:var(--accent-hi);transform:translateY(-2px);box-shadow:0 10px 22px var(--accent-glow)}
  .btn-primary:active{transform:translateY(0) scale(.98)}
  .btn-primary[disabled]{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-ghost{border:1px solid var(--border-strong);border-radius:12px;background:var(--surface);color:var(--ink-2);font-weight:600;cursor:pointer;transition:background .2s,border-color .2s,transform .2s}
  .btn-ghost:hover{background:var(--well);border-color:var(--faint);transform:translateY(-1px)}
  .btn-ghost:active{transform:none}

  .ripple{position:absolute;border-radius:9999px;background:rgba(255,255,255,.4);transform:scale(0);animation:ripple .6s var(--ease-out) forwards;pointer-events:none}
  @keyframes ripple{to{transform:scale(2.6);opacity:0}}

  /* ============ layout ============ */
  .app{display:flex;gap:20px;max-width:1240px;margin:0 auto;padding:20px;min-height:100vh}
  .sidebar{width:236px;flex:none;display:flex;flex-direction:column;padding:20px 16px;align-self:flex-start;position:sticky;top:20px;max-height:calc(100vh - 40px)}
  .main{flex:1;display:flex;flex-direction:column;gap:20px;min-width:0;padding-bottom:24px}

  .navitem{position:relative;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:1px solid transparent;background:transparent;cursor:pointer;font-size:14px;color:var(--ink-2);width:100%;text-align:left;transition:background .2s,color .2s,border-color .2s}
  .navitem::before{content:'';position:absolute;left:3px;top:50%;translate:0 -50%;width:3px;height:0;border-radius:2px;background:var(--accent);transition:height .28s var(--ease-out)}
  .navitem:hover{background:var(--well);border-color:var(--border)}
  .navitem.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .navitem.active::before{height:58%}
  .nav-badge{margin-left:auto;font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:2px 9px;border-radius:9999px;animation:badge-pulse 2.4s ease-in-out infinite}
  @keyframes badge-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  .theme-toggle{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;border:1px solid var(--border-strong);background:var(--surface);color:var(--mute);cursor:pointer;transition:background .2s,color .2s,transform .3s var(--ease-spring)}
  .theme-toggle:hover{background:var(--well);color:var(--accent);transform:rotate(15deg)}

  .appbar{display:none}
  .tabbar{display:none}

  /* ============ view transition / stagger ============ */
  .reveal{opacity:0;animation:rise .55s var(--ease-out) forwards;animation-delay:calc(var(--i,0)*70ms)}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .view-exit{animation:sink .18s ease-in forwards}
  @keyframes sink{to{opacity:0;transform:translateY(-10px)}}

  /* ============ components ============ */
  .page-head h1{margin:0;font-size:25px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
  .page-head p{margin:6px 0 0;font-size:14px;color:var(--mute)}
  .crumb{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--faint)}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .stat-card{padding:20px}
  .stat-icon{display:grid;place-items:center;width:42px;height:42px;border-radius:13px;color:var(--accent)}
  .stat-label{margin-top:15px;font-size:13px;color:var(--mute)}
  .stat-value{margin-top:2px;font-size:27px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
  .stat-unit{font-size:14px;font-weight:600;color:var(--mute)}

  .flame{animation:flame-flicker 1.8s ease-in-out infinite}
  @keyframes flame-flicker{0%,100%{transform:scale(1)}30%{transform:scale(1.12) rotate(-3deg)}60%{transform:scale(.96) rotate(2deg)}}
  .breathe{animation:breathe 3.4s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

  .track{height:10px;border-radius:9999px}
  .fill{height:100%;border-radius:9999px;background:linear-gradient(90deg,var(--accent-hi),var(--accent));width:0;animation:fillw 1.1s var(--ease-out) forwards;animation-delay:calc(.25s + var(--i,0)*90ms);position:relative;overflow:hidden}
  @keyframes fillw{to{width:var(--w)}}
  .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.45) 50%,transparent 70%);transform:translateX(-100%);animation:shine 2.6s ease-in-out infinite;animation-delay:1.4s}
  @keyframes shine{0%{transform:translateX(-100%)}45%,100%{transform:translateX(100%)}}

  .row-press{display:flex;align-items:center;gap:13px;padding:12px;border-radius:13px;border:1px solid transparent;cursor:pointer;transition:background .2s,border-color .2s,transform .2s}
  .row-press:hover{background:var(--well);border-color:var(--border);transform:translateX(3px)}

  /* quiz options — フラット＋境界線。状態は塗りと色で明示 */
  .optbtn{display:flex;width:100%;align-items:center;gap:14px;border:1.5px solid var(--border-strong);border-radius:14px;background:var(--surface);padding:15px 18px;text-align:left;cursor:pointer;color:var(--ink);font-size:14.5px;transition:border-color .2s,background .2s,transform .2s,opacity .3s}
  .optbtn:not(.locked):hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
  .optbtn.locked{opacity:1;cursor:default;transform:none}
  .optbtn.locked:not(.opt-correct):not(.opt-wrong){opacity:.5}
  .optbtn .marker{display:grid;width:26px;height:26px;flex-shrink:0;place-items:center;border-radius:9999px;border:1.5px solid var(--border-strong);color:var(--mute);font-size:12px;font-weight:700;transition:background .2s,color .2s,border-color .2s}
  .optbtn.opt-correct{border-color:var(--ok);background:var(--ok-bg);animation:glow-ok .9s ease-out}
  .optbtn.opt-correct .marker{background:var(--ok);border-color:var(--ok);color:#fff;animation:pop .45s var(--ease-spring)}
  .optbtn.opt-wrong{border-color:var(--ng);background:var(--ng-bg);animation:shake .45s ease-in-out}
  .optbtn.opt-wrong .marker{background:var(--ng);border-color:var(--ng);color:#fff;animation:pop .45s var(--ease-spring)}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
  @keyframes glow-ok{0%{box-shadow:0 0 0 0 var(--ok-bg),0 0 0 0 rgba(21,122,71,.4)}100%{box-shadow:0 0 0 14px transparent,0 0 0 14px transparent}}

  .exp{border-radius:14px;border:1px solid transparent;padding:0 17px;line-height:1.7;font-size:14px;display:flex;gap:10px;overflow:hidden;max-height:0;opacity:0;margin-top:0;transition:max-height .5s var(--ease-out),opacity .45s,margin .45s,padding .45s}
  .exp.show{max-height:200px;opacity:1;margin-top:18px;padding-top:14px;padding-bottom:14px}
  .exp.ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
  .exp.ng{background:var(--ng-bg);border-color:var(--ng);color:var(--ng)}

  .qcard{transition:opacity .2s,transform .2s}
  .qcard.leaving{opacity:0;transform:translateX(-26px)}

  /* result ring */
  .ring-wrap{position:relative;display:inline-grid;place-items:center}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:9;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1.3s var(--ease-out) .3s,stroke .4s}
  .ring-bg{fill:none;stroke-width:9;stroke:var(--nm-dark)}
  .ring-score{position:absolute;font-size:32px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
  .ring-score small{font-size:17px;color:var(--faint);font-weight:700}

  .confetti-box{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:99}
  .confetti{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:cfall linear forwards}
  @keyframes cfall{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(105vh) rotate(660deg)}}

  /* charts */
  .chart{display:flex;height:196px;align-items:stretch;gap:14px;border-radius:16px;padding:16px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
  .bar-area{flex:1;width:100%;display:flex;align-items:flex-end}
  .bar{width:100%;border-radius:7px;background:linear-gradient(180deg,var(--accent-hi),var(--accent));height:0;animation:barh .9s var(--ease-out) forwards;animation-delay:calc(.2s + var(--i,0)*80ms);transition:filter .2s,transform .2s;transform-origin:bottom;cursor:pointer}
  .bar:hover{filter:brightness(1.12);transform:scaleY(1.03)}
  @keyframes barh{to{height:var(--h)}}
  .dist{display:flex;height:14px;border-radius:9999px;overflow:hidden}
  .dist>div{width:0;animation:distw 1s var(--ease-out) forwards;animation-delay:.35s}
  @keyframes distw{to{width:var(--w)}}

  /* accent switcher */
  .accent-dots{display:flex;gap:10px;justify-content:center;padding:14px 0 2px}
  .accent-dot{width:22px;height:22px;border-radius:9999px;border:2px solid var(--surface);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .25s var(--ease-spring),outline .2s;outline:2px solid transparent;outline-offset:2px}
  .accent-dot:hover{transform:scale(1.2)}
  .accent-dot.active{outline-color:var(--accent);transform:scale(1.12)}

  code,pre{font-family:'JetBrains Mono',monospace}
  .codeblock{margin:16px 0 0;overflow-x:auto;border-radius:14px;background:#0f1729;border:1px solid rgba(255,255,255,.06);padding:18px 20px;font-size:13.5px;line-height:1.75;color:#cbd5e1;white-space:pre}

  /* ============ responsive (SP) ============ */
  @media (max-width:920px){
    .app{flex-direction:column;padding:0 16px 96px;gap:16px}
    .sidebar{display:none}
    .appbar{display:flex;align-items:center;justify-content:space-between;padding:14px 2px 2px;position:sticky;top:0;background:var(--bg);z-index:10;transition:background .35s}
    .stat-grid{grid-template-columns:1fr 1fr;gap:14px}
    .two-col{grid-template-columns:1fr !important}
    .page-head h1{font-size:22px}
    .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -4px 14px var(--nm-dark);padding:8px 6px calc(10px + env(safe-area-inset-bottom));z-index:20;transition:background .35s}
    .tab{flex:1;border:0;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;color:var(--faint);position:relative;transition:color .25s}
    .tab.active{color:var(--accent)}
    .tab.active svg{animation:tab-bounce .4s var(--ease-spring)}
    .tab-badge{position:absolute;top:-2px;right:22px;min-width:16px;height:16px;padding:0 4px;border-radius:9999px;background:var(--ng);color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center;animation:badge-pulse 2.4s ease-in-out infinite}
    @keyframes tab-bounce{0%{transform:translateY(3px) scale(.85)}100%{transform:none}}
    .chart{height:140px;gap:9px;padding:12px}
    .hero-cta{flex-direction:column;align-items:stretch !important}
  }

  /* ============ reduced motion ============ */
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-delay:0ms !important;transition-duration:.01ms !important}
    .reveal{opacity:1}
    .fill{width:var(--w)}
    .bar{height:var(--h)}
  }
</style>
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR (PC) ===== -->
  <aside class="sidebar nm">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 2px 20px">
      <div data-go="dashboard" class="go" style="display:flex;align-items:center;gap:12px;cursor:pointer">
        <span class="nm-sm breathe" style="display:grid;place-items:center;width:42px;height:42px;border-radius:13px;color:var(--accent)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
        <div style="line-height:1.25"><div style="font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.01em">DevPath</div><div style="font-size:11.5px;color:var(--faint)">Tech Study Lab</div></div>
      </div>
      <button class="theme-toggle" aria-label="テーマ切替" title="ライト/ダーク切替"></button>
    </div>
    <div style="padding:4px 8px 8px;font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--faint);text-transform:uppercase">メニュー</div>
    <nav style="display:flex;flex-direction:column;gap:6px">
      <button class="navitem" data-nav="dashboard" data-go="dashboard"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>ダッシュボード</button>
      <button class="navitem" data-nav="learn" data-go="learn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>教材（学習）</button>
      <button class="navitem" data-nav="quiz" data-go="quizIntro"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>演習</button>
      <button class="navitem" data-nav="review" data-go="reviewIntro"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>復習<span class="nav-badge">3</span></button>
      <button class="navitem" data-nav="analytics" data-go="analytics"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>アナリティクス</button>
      <button class="navitem" data-nav="domains" data-go="domains"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>学習領域</button>
      <button class="navitem"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>設定</button>
    </nav>

function applyAccent() {
  const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
  const [accent, hi] = ACCENTS[state.accent][theme];
  const n = accent.replace('#', '');
  const r = parseInt(n.slice(0, 2), 16), g = parseInt(n.slice(2, 4), 16), b = parseInt(n.slice(4, 6), 16);
  const root = document.documentElement.style;
  root.setProperty('--accent', accent);
  root.setProperty('--accent-hi', hi);
  root.setProperty('--accent-glow', `rgba(${r},${g},${b},.32)`);
  root.setProperty('--accent-soft', `rgba(${r},${g},${b},${theme === 'dark' ? '.16' : '.10'})`);
}

function setTheme(t) {
  document.documentElement.dataset.theme = t;

/* ================= render / transition ================= */
function render() {
  revealIdx = 0;
  view.innerHTML = screens[state.route]();
  window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
  updateNav();
  runCountUps();
  animateRing();
  bindView();
}

function go(route) {
  if (route === state.route) { render(); return; }
  if (reduceMotion) { state.route = route; render(); return; }
  view.classList.add('view-exit');
  setTimeout(() => {
    view.classList.remove('view-exit');
    state.route = route;
    render();
  }, 180);
}

function startExercise(mode) {
  state.mode = mode;
  state.qIndex = 0;
  state.answers = questions.map(() => null);
  go('exercise');
  if (state.route === 'exercise') render();
}

function updateNav() {
  const r = state.route, m = state.mode, lm = state.lastMode;
  const activeKey =
    r === 'dashboard' ? 'dashboard' :
    (r === 'learn' || r === 'article') ? 'learn' :
    (r === 'quizIntro' || (r === 'exercise' && m === 'quiz') || (r === 'result' && lm === 'quiz')) ? 'quiz' :
    (r === 'reviewIntro' || (r === 'exercise' && m === 'review') || (r === 'result' && lm === 'review')) ? 'review' :
    r === 'analytics' ? 'analytics' :
    r === 'domains' ? 'domains' : '';
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === activeKey);
  });
}

/* ================= animations ================= */
function runCountUps() {
  view.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    if (reduceMotion) { el.textContent = target; return; }
    const dur = 950;
    const t0 = performance.now();
    function tick(t) {
      const p = Math.min((t - t0) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased);
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function animateRing() {
  const ring = view.querySelector('#ringFg');
  if (!ring) return;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ring.style.strokeDashoffset = ring.dataset.target;
  }));
}

function confetti() {
  if (reduceMotion) return;
  const box = document.createElement('div');
  box.className = 'confetti-box';
  const colors = ['var(--accent)', 'var(--accent-hi)', '#f59e0b', '#22a866', '#ec4899', '#8b5cf6'];
  for (let i = 0; i < 70; i++) {
    const c = document.createElement('span');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = 2 + Math.random() * 1.6 + 's';
    c.style.animationDelay = Math.random() * .5 + 's';
    c.style.transform = `scale(${.7 + Math.random() * .8})`;
    box.appendChild(c);
  }
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 4600);
}

function addRipple(btn, ev) {
  if (reduceMotion) return;
  const rect = btn.getBoundingClientRect();
  const d = Math.max(rect.width, rect.height);
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.width = r.style.height = d + 'px';
  r.style.left = ((ev.clientX || rect.left + rect.width / 2) - rect.left - d / 2) + 'px';
  r.style.top = ((ev.clientY || rect.top + rect.height / 2) - rect.top - d / 2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 650);
}

/* ================= quiz interaction ================= */
function selectOption(i) {
  if (state.route !== 'exercise') return;
  if (state.answers[state.qIndex] !== null) return;
  const q = questions[state.qIndex];
  state.answers[state.qIndex] = i;
  const isCorrect = i === q.correct;

  view.querySelectorAll('.optbtn').forEach((btn, idx) => {
    btn.classList.add('locked');
    const marker = btn.querySelector('.marker');
    if (idx === q.correct) {
      btn.classList.add('opt-correct');
      marker.innerHTML = icons.checkBold;
    } else if (idx === i) {
      btn.classList.add('opt-wrong');
      marker.innerHTML = icons.xBold;
    }
  });

  const exp = view.querySelector('#explanation');
  exp.classList.add(isCorrect ? 'ok' : 'ng');
  exp.innerHTML = `<span style="font-weight:700;flex:none">${isCorrect ? '正解' : '不正解'}</span><span>${q.note}</span>`;
  requestAnimationFrame(() => exp.classList.add('show'));

  const next = view.querySelector('#nextBtn');
  next.disabled = false;
  next.focus({ preventScroll: true });
}

function nextQuestion() {
  if (state.answers[state.qIndex] === null) return;
  const card = view.querySelector('#qcard');
  const advance = () => {
    if (state.qIndex < questions.length - 1) {
      state.qIndex++;
      render();
    } else {
      state.lastMode = state.mode;
      state.route = 'result';
      render();
      const score = questions.filter((q, i) => state.answers[i] === q.correct).length;
      if (score === questions.length) setTimeout(confetti, 900);
    }
  };
  if (reduceMotion || !card) { advance(); return; }
  card.classList.add('leaving');
  setTimeout(advance, 190);
}

/* ================= event wiring ================= */
function bindView() {
  view.querySelectorAll('[data-opt]').forEach(btn => {
    btn.addEventListener('click', () => selectOption(parseInt(btn.dataset.opt, 10)));
  });
  const next = view.querySelector('#nextBtn');
  if (next) next.addEventListener('click', nextQuestion);
}

document.addEventListener('click', ev => {
  const primary = ev.target.closest('.btn-primary');
  if (primary && !primary.disabled) addRipple(primary, ev);

  const tt = ev.target.closest('.theme-toggle');
  if (tt) { setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'); return; }

  const starter = ev.target.closest('[data-start]');
  if (starter) { startExercise(starter.dataset.start); return; }

  const goer = ev.target.closest('[data-go]');
  if (goer) { go(goer.dataset.go); return; }

  const dot = ev.target.closest('.accent-dot');
  if (dot) {
    state.accent = dot.dataset.accent;
    applyAccent();
    document.querySelectorAll('.accent-dot').forEach(d => d.classList.toggle('active', d === dot));
  }
});

document.addEventListener('keydown', ev => {
  if (state.route !== 'exercise') return;
  if (ev.key >= '1' && ev.key <= '4') selectOption(parseInt(ev.key, 10) - 1);
  if (ev.key === 'Enter') nextQuestion();
});

/* ================= boot ================= */
let initialTheme = 'light';
try { initialTheme = localStorage.getItem('devpath-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } catch (e) {}
setTheme(initialTheme);
render();
</script>
